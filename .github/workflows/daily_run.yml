name: Daily arXiv Radar

# 触发条件设置
on:
  schedule:
    # 每天 UTC 时间 00:00 运行（对应北京时间早上 08:00）
    - cron: '0 0 * * *'
  # 允许你手动点击按钮触发（方便调试）
  workflow_dispatch: 

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install feedparser

    - name: 运行学术雷达并推送到飞书
      env:
        # 将 GitHub Secrets 中的飞书链接传递给 Python 的 os.environ
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: |
        python arxiv_radar.py
